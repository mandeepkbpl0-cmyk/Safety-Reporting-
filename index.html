<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Safety Access Portal - Veerka Beverages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --safety-green: #2d7a32; --dark-green: #1b5e20; }
        body { background-color: #f0f4f1; }
        .header { background: white; border-bottom: 4px solid var(--safety-green); padding: 15px; margin-bottom: 20px; }
        .access-box { max-width: 450px; margin: 80px auto; border-radius: 15px; border-top: 6px solid var(--safety-green); }
        #reportingSection { display: none; } /* Hidden by default */
        .btn-green { background: var(--safety-green); color: white; font-weight: bold; }
        .btn-green:hover { background: var(--dark-green); color: white; }
    </style>
</head>
<body>

<div class="header text-center shadow-sm">
    <h2 style="color: var(--dark-green); font-weight: 800;">VEERKA BEVERAGES PRIVATE LIMITED</h2>
    <p class="text-muted mb-0">Goindwal Sahib | Safety Management System</p>
</div>

<div class="container">
    <div id="accessSection" class="card access-box shadow-lg p-4">
        <div class="text-center mb-4">
            <img src="https://cdn-icons-png.flaticon.com/512/2550/2550260.png" width="60">
            <h4 class="mt-3">Employee Verification</h4>
            <p class="small text-muted">Reporting shuru karne ke liye apni ID enter karein</p>
        </div>
        <div class="mb-3">
            <input type="text" id="empID" class="form-control form-control-lg text-center" placeholder="e.g. VEERKA-101">
        </div>
        <button onclick="verifyAccess()" class="btn btn-green w-100 py-2">VERIFY & PROCEED</button>
        <div id="errorMsg" class="text-danger mt-3 text-center" style="display:none;">❌ Invalid ID! Please contact Safety Dept.</div>
    </div>

    <div id="reportingSection" class="mt-4">
        <div class="alert alert-success text-center">
            <strong>Access Granted!</strong> Aap report submit kar sakte hain.
        </div>
        <div class="card shadow p-4 mx-auto" style="max-width: 700px;">
            <h4 class="text-success border-bottom pb-2">New Incident Report</h4>
            <form id="actualForm">
                <div class="mb-3 mt-3">
                    <label class="fw-bold">Report Type</label>
                    <select class="form-select" name="type">
                        <option>Unsafe Act</option>
                        <option>Unsafe Condition</option>
                        <option>Near Miss</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="fw-bold">Description</label>
                    <textarea class="form-control" rows="3" name="desc" placeholder="Details likhein..."></textarea>
                </div>
                <button type="button" class="btn btn-green w-100 py-2 mt-3">SUBMIT REPORT</button>
            </form>
        </div>
    </div>
</div>

<script>
    function verifyAccess() {
        const idInput = document.getElementById('empID').value.trim().toUpperCase();
        
        // Yahan aap apni company ke IDs ki list ya pattern check kar sakte hain
        // Example: Agar ID 'VEERKA' se shuru hoti hai toh access de do
        if(idInput.startsWith("VEERKA-") || idInput === "ADMIN786") {
            document.getElementById('accessSection').style.display = 'none';
            document.getElementById('reportingSection').style.display = 'block';
        } else {
            const error = document.getElementById('errorMsg');
            error.style.display = 'block';
            setTimeout(() => { error.style.display = 'none'; }, 3000);
        }
    }
</script>

</body>
</html>
