<!DOCTYPE html>
<html>
<head>
    <title>Safety Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --safety-red: #d9534f; --safety-blue: #0275d8; }
        body { background-color: #f4f7f6; }
        .login-box { max-width: 400px; margin: 100px auto; display: block; }
        .main-content { display: none; margin-top: 30px; }
        .header-banner { background: var(--safety-red); color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginArea" class="card login-box shadow p-4">
        <h3 class="text-center mb-4">Safety Portal Login</h3>
        <input type="password" id="adminPass" class="form-control mb-3" placeholder="Enter Employee Access Code">
        <button onclick="checkLogin()" class="btn btn-primary w-100">Login</button>
        <p id="loginError" class="text-danger mt-2" style="display:none;">Wrong Access Code!</p>
    </div>

    <div id="mainSite" class="main-content">
        <div class="header-banner text-center shadow">
            <h1>SAFETY FIRST / ਸੁਰੱਖਿਆ ਪਹਿਲਾਂ</h1>
            <p>Zero Harm - Report Every Near Miss & Unsafe Condition</p>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card shadow p-4">
                    <h4>📝 New Incident Report</h4>
                    <form id="reportForm">
                        <label class="mt-2">Type</label>
                        <select name="reportType" class="form-select" required>
                            <option value="Unsafe Act">Unsafe Act</option>
                            <option value="Unsafe Condition">Unsafe Condition</option>
                            <option value="Near Miss">Near Miss</option>
                        </select>

                        <label class="mt-2">Location</label>
                        <input type="text" name="location" class="form-control" placeholder="e.g. Line 2, Gate 4" required>

                        <label class="mt-2">Description</label>
                        <textarea name="description" class="form-control" rows="3" required></textarea>

                        <label class="mt-2">Reported By (Name/ID)</label>
                        <input type="text" name="reportedBy" class="form-control" required>

                        <label class="mt-2">Upload Photo</label>
                        <input type="file" name="myFile" class="form-control">

                        <button type="button" onclick="submitData(this.form)" class="btn btn-danger w-100 mt-4">Submit Report</button>
                    </form>
                    <div id="status" class="mt-3 text-center fw-bold"></div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow p-4 text-center">
                    <h4>📊 Live Safety Dashboard</h4>
                    <p>Dashboard updates every 5 minutes.</p>
                    <div class="bg-light p-5 border">Chart Preview Area</div>
                    <a href="YOUR_GOOGLE_SHEET_LINK" target="_blank" class="btn btn-outline-primary mt-4">View Full Excel Report</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Simple Admin Access Logic
    function checkLogin() {
        const pass = document.getElementById('adminPass').value;
        if(pass === "SAFETY123") { // Aap apna code set kar sakte ho
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('mainSite').style.display = 'block';
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function submitData(form) {
        const status = document.getElementById('status');
        status.innerHTML = "Uploading... Please wait.";
        status.style.color = "orange";

        const scriptURL = 'YOUR_APPS_SCRIPT_WEB_APP_URL';
        
        // Note: Apps Script ke sath File upload handle karne ke liye 
        // hume reader use karna padta hai, ye basic example hai.
        const formData = new FormData(form);
        
        // For simplicity in this HTML, we link the direct Script URL
        fetch(scriptURL, { method: 'POST', body: formData})
          .then(response => {
              status.innerHTML = "Report Submitted Successfully!";
              status.style.color = "green";
              form.reset();
          })
          .catch(error => {
              status.innerHTML = "Error! Connection Failed.";
              status.style.color = "red";
          });
    }
</script>

</body>
</html>
