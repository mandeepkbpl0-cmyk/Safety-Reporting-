<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Reporting Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }

                    </div>
                </div>
                
                <div class="mt-4 text-center">
                    <a href="https://docs.google.com/spreadsheets/d/1MqElId87vQyICAMeulWjrCMnCyEwaYFnkW_OZE_IPow/edit?usp=sharing" target="_blank" class="btn btn-success btn-lg">View Safety Dashboard (Excel)</a>

        </div>
    </div>

</html>
